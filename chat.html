<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bishal AI - Shiva Shakti Mobile Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1B65D6;
            --primary-dark: #114599;
            --bg: #F4F6F9; /* Clean Light Slate/Off-white Theme for Workspace */
            --panel-bg: #FFFFFF; /* White Dashboard panel background */
            --text-main: #1F2937; /* Dark Charcoal for highly readable text */
            --text-sub: #6B7280; /* Muted slate for subtitles */
            --border: rgba(0, 0, 0, 0.08); /* Soft grey border */
            --card-hover: rgba(0, 0, 0, 0.02);
            --shadow: 0 20px 40px rgba(11, 15, 25, 0.08); /* Gentle clean shadow */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        /* Sleek Modern Light Scrollbars for Chat Window */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.02);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.12);
            border-radius: 4px;
            border: 2px solid transparent;
            background-clip: padding-box;
            transition: background 0.2s;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 0, 0, 0.25);
            border: 2px solid transparent;
            background-clip: padding-box;
        }

        /* Firefox support */
        * {
            scrollbar-width: thin;
            scrollbar-color: rgba(0, 0, 0, 0.12) rgba(0, 0, 0, 0.02);
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            overflow: hidden;
        }

        .workspace {
            width: 100%;
            max-width: 480px; /* Elegant standalone chat width */
            height: 100%;
            max-height: 780px;
            background: var(--panel-bg);
            border-radius: 28px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── CHAT PANEL ── */
        .chat-panel {
            display: flex;
            flex-direction: column;
            background: #FFFFFF; /* Clean white backdrop */
            height: 100%;
            flex: 1;
        }

        .chat-header {
            padding: 24px;
            background: rgba(0, 0, 0, 0.02);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--primary), #3B82F6);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            font-size: 20px;
            box-shadow: 0 4px 12px rgba(27, 101, 214, 0.2);
        }

        .header-info h2 {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-main);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: #16A34A; /* Legible Forest Green for Light Background */
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 2px;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: #16A34A;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 1; box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.4); }
            70% { transform: scale(1); opacity: 0.8; box-shadow: 0 0 0 6px rgba(22, 163, 74, 0); }
            100% { transform: scale(0.9); opacity: 1; box-shadow: 0 0 0 0 rgba(22, 163, 74, 0); }
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #F8FAFC; /* Light Slate base for messages area */
        }

        .message {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease-out;
        }

        .message.bot {
            align-self: flex-start;
            background: #E2E8F0; /* Modern soft gray chat bubble */
            color: var(--text-main);
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(0, 0, 0, 0.04);
        }

        .message.user {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 10px rgba(27, 101, 214, 0.15);
        }

        .lead-badge {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid rgba(22, 163, 74, 0.15);
            color: #16A34A;
            font-size: 11px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .input-area {
            padding: 24px;
            background: #FFFFFF;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 14px;
            background: #F1F5F9; /* Very soft slate input area */
            border: 1px solid rgba(0, 0, 0, 0.08);
            color: var(--text-main);
            outline: none;
            font-size: 14px;
            transition: all 0.2s;
        }

        input:focus {
            background: #FFFFFF;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(27, 101, 214, 0.15);
        }

        .send-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 24px;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(27, 101, 214, 0.2);
        }

        .send-btn:hover {
            background: var(--primary-dark);
        }

        /* ── LOADING DOTS FOR CHAT ── */
        .loading-dots {
            display: flex;
            gap: 4px;
            padding: 4px 8px;
            align-items: center;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--text-sub);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* ── RESPONSIVE & MOBILE DESIGN ── */
        @media (max-width: 520px) {
            body {
                padding: 10px;
                height: 100vh;
                overflow: hidden;
            }

            .workspace {
                max-width: 100%;
                height: 100%;
                max-height: none;
                border-radius: 16px;
            }

            .chat-header, .input-area {
                padding: 16px;
            }

            .message {
                max-width: 90%;
                padding: 10px 14px;
            }
        }
    </style>
</head>
<body>

    <div class="workspace">
        <!-- ── BISHAL AI CHAT PANEL ── -->
        <div class="chat-panel">
            <div class="chat-header">
                <div class="avatar">B</div>
                <div class="header-info">
                    <h2>Bishal AI</h2>
                    <div class="status-badge">
                        <div class="pulse-dot"></div>
                        Senior Salesman
                    </div>
                </div>
            </div>

            <div class="messages-area" id="chat-messages">
                <div class="message bot">
                    Namaskar sir! Welcome to Shiva Shakti Mobile Center. Ma Bishal, hajur lai k phone, exchange, athawa repair bare bujhnu thiyo?
                </div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <input type="text" id="user-input" placeholder="Type here..." autocomplete="off">
                </div>
                <button class="send-btn" id="send-btn">Send</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000/api/chat';
        const API_KEY = 'gIUOmaMUwrnyyNAmcqvmc9RAnYtHVi6hR0E4j3UJzWM';
        const sessionId = 'test_' + Math.random().toString(36).substring(7);

        const messagesArea = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        // ── CHAT ENGINE ──
        function appendMessage(role, text, leadCaptured = false) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerText = text;

            if (leadCaptured) {
                const badge = document.createElement('div');
                badge.className = 'lead-badge';
                badge.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="display:inline;vertical-align:middle;margin-right:4px;"><path d="M20 6L9 17L4 12"/></svg>✓ Saved to Supabase (leads)';
                div.appendChild(badge);
            }

            messagesArea.appendChild(div);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        async function handleSend() {
            const message = userInput.value.trim();
            if (!message) return;

            userInput.value = '';
            appendMessage('user', message);
            
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message bot loading';
            loadingDiv.innerHTML = '<div class="loading-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
            messagesArea.appendChild(loadingDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-Key': API_KEY
                    },
                    body: JSON.stringify({
                        message: message,
                        session_id: sessionId
                    })
                });

                const data = await response.json();
                messagesArea.removeChild(loadingDiv);

                if (response.ok) {
                    appendMessage('bot', data.reply, data.lead_captured);
                } else {
                    appendMessage('bot', 'Error: ' + (data.detail || 'Failed to connect.'));
                }
            } catch (error) {
                messagesArea.removeChild(loadingDiv);
                appendMessage('bot', 'Error: Could not reach backend server. Is main.py running?');
            }
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });
    </script>
</body>
</html>
